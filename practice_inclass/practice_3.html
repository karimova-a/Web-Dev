<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Color Switcher</h1>
  </header>

  <main>
    <p>Current Color: <span id="color-code">#FFFFFF</span></p>
    <div class="color-buttons">
      <button class="color-btn" id="red">color1</button>
      <button class="color-btn" id="green"> color2</button>
      <button class="color-btn" id="blue"> color3</button>
      <button class="color-btn" id="purple"> color4</button>
      <button class="color-btn" id="orange"> color5</button>
    </div>
    <button id="random-btn">Random Color</button>
    <button id="reset-btn">Reset Button</button>
  </main>
<script src="scripts.js"></script>
</body>
</html>
