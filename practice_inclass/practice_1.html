<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Wanderlust Travel Agency - Adventure Awaits</title>
        <style>
            #navbar{
                position:fixed ;
                width:92%;
                background-color: hsla(2,5%,30%,0.4);
                padding: 30px;
                z-index: 2;
                box-shadow: 20px;
            }

            .logo{
                text-align:left ;
                font-weight:bold;
                font-size:larger; 
            }

            ul{
                text-align: right;
                
            }
            a:hover{
                color:chartreuse;
            }
            a:link, a:visited{
                text-decoration: none;
            }


            #hero{
                height:80px ;
                background-color:darksalmon;
                align-content: center;
                color: white ;
                text-shadow: 4px;

            .btn-primary{
                background-color: aquamarine;
                padding:10px;

            }
            .btn-secondary{
                border: solid; 
                padding:10px;
                border-radius: 12px;
            }

            h3{
                text-align: center;
            }

        </style>

    <body>
        <div id="navbar">
            <span class="logo">Wanderlust</span>

            <ul>
                <li><a href="#dest">Destinations</a></li>
                <li><a href="#tour">Tours</a></li>
                <li><a href="#review">Reviews</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#book">Book Now</a></li>
            </ul>
        </div>

        <section id="hero"><
        <div>
            <h3><strong>Explore The World With Us</strong></h3>
            <p>Unforgettable adventures, breathtaking destinations, memories that last forever</p>
            <button class="btn-primary">View Destinations</button>
            <button class="btn-secondary">Plan Your Trip</button>
        </div>
        </section>

        <section id="destinations" class="section">
            <h3>Popular DEstinations</h3>

        </section>

</html>
