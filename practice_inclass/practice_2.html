<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked In - Sign in & Jobs</title>
    <link rel="stylesheet" href="stylee.css">
</head>
<body>
  <header>
    <nav>
      <h1>Linked <span class="logo-box">in</span></h1>
      <input type="search" placeholder="Search jobs, people, companies">
      <ul class="menu">
        <li><a href="#" class="navi">Jobs</a></li>
        <li><a href="#" class="navi">People</a></li>
        <li><a href="#" class="navi">Learning</a></li>
      </ul>

      <button type="button" class="btn-outline">Join now</button>
      <button type="button" class="btn-primary">Sign in</button>
    </nav>
  </header>

  <section id="hero">
    <div class="hero-text">
      <h1>Welcome to your <span class="highlight">professional</span> community</h1>
    </div>

    <div class="hero-form">
      <form>
        <label for="email">Email or phone</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address">
        <br>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <br>
        <a href="#" class="forgot-pass">Forgot your password?</a>
        <br>

        <button type="submit" class="btn-primary1">Sign in</button>
        <hr class="divcenter">OR
        <button type="submit" class="btn-outline1">Join now</button>
        <hr>
        <button type="button" class="btn-social" >Continue with Google</button>

      </form>
    </div>
  </section>

  <section id="jobs">
    <
  </section>
</body>
</html>
