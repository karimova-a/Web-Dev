<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="todo-box">
  <!-- exactly two headings as in the screenshot -->
  <h1>ToDo List</h1>
  <h2>ToDo List</h2>

  <!-- form: New Task + input + Add button -->
  <form id="todo-form">
    <label for="task-input">New Task</label>
    <div class="input-row">
      <input type="text" id="task-input" placeholder="" autofocus>
      <button type="submit" id="add-btn">Add</button>
    </div>
  </form>

  <!-- task list – will be populated by JavaScript -->
  <ul id="task-list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
